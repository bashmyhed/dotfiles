
$mainMod = SUPER # Sets "Windows" key as main modifier

source = ~/.config/hypr/baseBinds.conf      #base keybinds
source = ~/.config/hypr/windowrules.conf    #window rules
source = ~/.config/hypr/customBinds.conf    #custom keybinds
source = ~/.config/hypr/browserBinds.conf   #browser keybinds

################
### MONITORS ###
################

monitor=,preferred,auto,1
# monitor=eDP-1, 1920x1080@60, 0x0, 1, transform, 1


###################
### MY PROGRAMS ###
###################

$terminal = foot
$fileManager = thunar
$Discord = vesktop


##################
### AUTOSTART ###
#################

exec-once = kdeconnectd
exec-once = hyprpaper
exec-once = dunst
exec-once = lxpolkit
exec-once = $Discord --disable-gpu --disable-gpu-compositing --start-minimized
exec-once = $HOME/.config/scripts/xdg-portal.sh
exec-once = $HOME/.config/scripts/hypridle-inhibit.sh
exec-once = $HOME/.config/xdg-dirs/dirs.sh
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = hypridle
exec-once = touch /tmp/hypr_animations_enabled
exec-once = thunar --daemon


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = GBM_BACKEND,nvidia-drm 
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = LIBVA_DRIVER_NAME,nvidia
env = NVD_BACKEND,direct
env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

env = XDG_SESSION_TYPE,wayland


env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = WINE_VK_USE_FSR,1                       # Enable FSR in Wine games (if supported)
env = PROTON_ENABLE_NVAPI,1                   # NVIDIA API for Proton games
env = DXVK_ENABLE_NVAPI,1

env = MOZ_ENABLE_WAYLAND,1                     # Enable Firefox Wayland
# env = QT_QPA_PLATFORM,xcb                     # OBS works better with X11 backend
# env = OBS_USE_EGL,1                           # Hardware acceleration for OBS

env = WLR_RENDERER,vulkan                     # Use Vulkan renderer (better for NVIDIA)
env = WLR_NO_HARDWARE_CURSORS,1
env = KWALLET_SKIP_OPEN_IF_LOCKED,1


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 3
    gaps_out = 4

    border_size = 3

    # col.active_border = rgba(902DF3EE) rgba(5A1A9BCC) 135deg
    # col.active_border = rgba(000000FF) rgba(000000FF) 0deg
    # col.inactive_border = rgba(595959aa)

col.active_border = rgba(263238FF) rgba(1C2429FF) 0deg
col.inactive_border = rgba(14191CCC)






    #!Todo  have to check on it later
    allow_tearing = false

    layout = dwindle


}
dwindle {
    preserve_split = true
}

decoration {
    rounding = 7
    rounding_power = 2

    active_opacity = 0.9
    inactive_opacity = 0.9

    # active_opacity = 0.85
    # inactive_opacity = 0.85

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = yes

    # Curves
    bezier = smooth, 0.25, 1.0, 0.35, 1.0   # smooth but slightly tighter
    bezier = fast,   0.4,  0.9,  0.7, 1.0   # quicker easing, no overshoot

    # Windows
    animation = windows,    1, 6, smooth, slide   # new windows slide in smoothly
    animation = windowsOut, 1, 5, fast, slide # closing is quick & clean

    # Borders
    animation = border,     1, 5, fast            # responsive border switch

    # Fade
    animation = fade,       1, 6, smooth          # softer fade

    # Workspaces
    animation = workspaces, 1, 6, smooth, slide   # horizontal smooth slide
}


