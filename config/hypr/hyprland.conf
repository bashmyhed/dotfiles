dwindle {
    # pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

#############
### INPUT ###
#############
input {
    kb_layout = us
    kb_options = caps:escape

    repeat_rate = 30
    repeat_delay = 300
    follow_mouse = 1

    sensitivity = 0 #Do not change

    touchpad {
        natural_scroll = false
    }
}

#!Todo 
gestures {
    # workspace_swipe = false
}

device {
    name = epic-mouse-v1
    sensitivity = -0.1
}

Group {
}

