# basic Window Manager keybinds
bind = $mainMod, w, killactive,
bind = $mainMod, s, togglefloating,
bind = $mainMod, F, fullscreen,
# bind = $mainMod SHIFT, F, fakefullscreen,
bind = SUPER, C, cyclenext    # bring it to the top
bind = CTRL, END, exec, ~/.config/scripts/hypr-opacity.sh  # toggle opacity script
bind = SUPER, N, exec, ~/.config/scripts/toggleAnimations.sh # toggle animations script
bind = $mainMod, R, togglesplit, # dwindle
#bind = $mainMod, P, pseudo, # dwindle

# Move focus with mainMod + vim keys
bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, j, movefocus, d
bind = SUPER, k, movefocus, u

#move windows
bind = SUPER SHIFT, h, movewindow, l
bind = SUPER SHIFT, l, movewindow, r
bind = SUPER SHIFT, j, movewindow, u
bind = SUPER SHIFT, k, movewindow, d

#resize windwows
binde = SUPER CTRL, h, resizeactive, -10 0
binde = SUPER CTRL, l, resizeactive, 10 0 
binde = SUPER CTRL, j, resizeactive, 0 10
binde = SUPER CTRL, k, resizeactive, 0 -10


# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Switching between previous and last workspace
bind = $mainMod, Tab, workspace, previous 
bind = $mainMod, grave, focuswindow, previous

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, m, togglespecialworkspace, magic
bind = $mainMod SHIFT, m, movetoworkspace, special:magic

bind = $mainMod, a, togglespecialworkspace, ai
bind = $mainMod SHIFT, a, movetoworkspace, special:ai


# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, ~/.config/scripts/volume.sh up 
bindel = ,XF86AudioLowerVolume, exec, ~/.config/scripts/volume.sh down
bindel = ,XF86AudioMute, exec, ~/.config/scripts/volume.sh mute
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec,~/.config/scripts/brightness.sh up
bindel = ,XF86MonBrightnessDown, exec, ~/.config/scripts/brightness.sh down 
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


