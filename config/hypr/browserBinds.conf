# 🔹 ALT + SHIFT + Key → Open in Chromium
bind = ALT SHIFT, w, exec, chromium --new-tab "https://web.whatsapp.com/"
bind = ALT SHIFT, y, exec, chromium --new-tab "https://youtube.com/"
bind = ALT SHIFT, i, exec, chromium --new-tab "https://monkeytype.com/"
bind = ALT SHIFT, p, exec, chromium --new-tab "https://hentaifox.com/"
bind = ALT SHIFT, n, exec, chromium --new-tab "https://nyaa.si/"
bind = ALT SHIFT, m, exec, chromium --new-tab "https://open.spotify.com/"
bind = ALT SHIFT, d, exec, chromium --new-tab "https://discord.com/channels/@me"
bind = ALT SHIFT, u, exec, chromium --new-tab "https://makaut1.ucanapply.com/smartexam/public/"
bind = ALT SHIFT, c, exec, chromium --new-tab "https://chatgpt.com/"
bind = ALT SHIFT, b, exec, chromium --new-tab "https://myanimelist.net/profile/PaulSteve"
bind = ALT SHIFT, e, exec, chromium --new-tab "http://moodlebppimt.ddns.net/login/index.php"
bind = ALT SHIFT, g, exec, firefox --new-tab "https://www.cloudskillsboost.google/"

