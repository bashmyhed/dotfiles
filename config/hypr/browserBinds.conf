# bind = ALT, w, exec, firefox --new-tab "https://web.whatsapp.com/"
# bind = ALT, y, exec, firefox --new-tab "https://youtube.com/"
# bind = ALT, c, exec, firefox --new-tab "https://chatgpt.com/"


bind = ALT, Y, exec, hyprctl dispatch workspace 10 && firefox --new-window https://www.youtube.com && sleep 0.2 && hyprctl dispatch tagwindow +youtube && hyprctl dispatch fullscreenstate 0 2
bind = ALT, m, exec, hyprctl dispatch workspace 8 && firefox --new-window https://open.spotify.com && sleep 0.2 && hyprctl dispatch tagwindow +spotify && hyprctl dispatch fullscreenstate 0 2
bind = ALT, w, exec, hyprctl dispatch workspace 9 && firefox --new-window https://web.whatsapp.com && sleep 0.2 && hyprctl dispatch tagwindow +whatsapp && hyprctl dispatch fullscreenstate 0 2
bind = ALT, C, exec, hyprctl dispatch workspace special:ai && firefox --new-window https://chat.openai.com && sleep 0.2 && hyprctl dispatch tagwindow +ai && hyprctl dispatch fullscreenstate 0 2


