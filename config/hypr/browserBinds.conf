# 🔹 ALT + Key → Open in Firefox
bind = ALT, i, exec, firefox --new-tab "https://monkeytype.com/"
bind = ALT, p, exec, firefox --new-tab "https://hentaifox.com/"
bind = ALT, n, exec, firefox --new-tab "https://nyaa.si/"
bind = ALT, d, exec, firefox --new-tab "https://discord.com/channels/@me"
bind = ALT, u, exec, firefox --new-tab "https://makaut1.ucanapply.com/smartexam/public/"
bind = ALT, b, exec, firefox --new-tab "https://myanimelist.net/profile/PaulSteve"
bind = ALT, e, exec, firefox --new-tab "http://moodlebppimt.ddns.net/login/index.php"
bind = ALT, g, exec, firefox --new-tab "https://www.cloudskillsboost.google/"
