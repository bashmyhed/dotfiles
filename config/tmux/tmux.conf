# Set a more convenient leader key
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

setw -g mode-keys vi  # Use vi keys in copy mode


# Set status bar colors
set -g status-style bg=default,fg=white
set -g window-status-current-style bg=magenta,fg=black
set -g status-left ''

# Enable mouse support
set -g mouse on

# Increase history limit
set -g history-limit 5000

# Faster command sequences
set -g escape-time 10

# Set terminal to 256 color
set -g default-terminal "screen-256color"

# -- Suggested Shortcuts --

# Reload config with leader + r
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# Split panes with | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys (Shift + H, J, K, L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Set fish as the default shell                                                                                                                                                       │
set-option -g default-shell /sbin/fish

# 🏠 Home-row bindings

# Enter copy mode with Ctrl+s (easy left hand)
bind -n C-s copy-mode

# Paste buffer with Ctrl+e
bind -n C-e paste-buffer

# Copy to system clipboard (X11 version, use wl-copy for Wayland)
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# Optional: Reload config with Ctrl+r
bind r source-file ~/.tmux.conf \; display-message "Reloaded .tmux.conf"

